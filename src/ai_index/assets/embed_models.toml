# Defaults

[defaults.api]
batch_size = 1000

[defaults.local]
device = "cuda"
dtype = "float16"
batch_size = 64

[defaults.sbatch]
dtype = "float16"
batch_size = 64
job_name = "embed"
time = "01:00:00"
setup = false

# Models

[models.voyage-4-lite]
mode = "api"
model = "voyage-4-lite"

[models.voyage-4-large]
mode = "api"
model = "voyage-4-large"

[models.bge-large-local]
mode = "local"
model = "BAAI/bge-large-en-v1.5"

[models.bge-large-sbatch]
mode = "sbatch"
model = "BAAI/bge-large-en-v1.5"
