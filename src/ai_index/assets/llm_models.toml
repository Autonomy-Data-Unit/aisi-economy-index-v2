# Defaults

[defaults.api]

[defaults.local]
max_new_tokens = 60
device = "cuda"
dtype = "float16"
backend = "transformers"
batch_size = 128

[defaults.sbatch]
max_new_tokens = 60
dtype = "float16"
backend = "vllm"
job_name = "llm_generate"
time = "02:00:00"
setup = false

# Models

[models."gpt-5.2"]
mode = "api"
model = "openai/gpt-5.2"

[models.gemini-2-flash]
mode = "api"
model = "gemini/gemini-2.0-flash"

[models.qwen-7b-local]
mode = "local"
model = "Qwen/Qwen2.5-7B-Instruct"

[models.qwen-7b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen2.5-7B-Instruct"
time = "00:30:00"
