# nblite configuration
export_pipeline = """
nbs -> lib
nbs -> pts

nbs_tests -> lib_tests
nbs_tests -> pts_tests

nbs_isambard -> lib_isambard
nbs_isambard -> pts_isambard

nbs_isambard_tests -> lib_isambard_tests
nbs_isambard_tests -> pts_isambard_tests

nbs_dev -> lib_dev
nbs_dev -> pts_dev
"""

[cl.nbs]
path = "nbs/ai_index"
format = "ipynb"

[cl.pts]
path = "pts/ai_index"
format = "percent"

[cl.lib]
path = "src/ai_index"
format = "module"


[cl.nbs_tests]
path = "nbs/tests"
format = "ipynb"

[cl.pts_tests]
path = "pts/tests"
format = "percent"

[cl.lib_tests]
path = "src/tests"
format = "module"


[cl.nbs_isambard]
path = "nbs/isambard_utils"
format = "ipynb"

[cl.pts_isambard]
path = "pts/isambard_utils"
format = "percent"

[cl.lib_isambard]
path = "src/isambard_utils"
format = "module"


[cl.nbs_isambard_tests]
path = "nbs/isambard_utils_tests"
format = "ipynb"

[cl.pts_isambard_tests]
path = "pts/isambard_utils_tests"
format = "percent"

[cl.lib_isambard_tests]
path = "src/isambard_utils_tests"
format = "module"


[cl.nbs_dev]
path = "nbs/dev_utils"
format = "ipynb"

[cl.pts_dev]
path = "pts/dev_utils"
format = "percent"

[cl.lib_dev]
path = "src/dev_utils"
format = "module"
