# Defaults

[defaults.api]

[defaults.local]
max_new_tokens = 60
device = "cuda"
dtype = "float16"
backend = "transformers"
batch_size = 128

[defaults.sbatch]
max_new_tokens = 60
dtype = "fp8"
backend = "vllm"
gpus = 1
job_name = "llm_generate"
setup = true

# Models

[models."gpt-5.2"]
mode = "api"
model = "openai/gpt-5.2"

[models.gemini-2-flash]
mode = "api"
model = "gemini/gemini-2.0-flash"

[models.qwen-7b-local]
mode = "local"
model = "Qwen/Qwen2.5-7B-Instruct"

[models."qwen-0.5b-mac"]
mode = "local"
model = "Qwen/Qwen2.5-0.5B-Instruct"
device = "cpu"
dtype = "float32"
batch_size = 16

# Sbatch models

[models.qwen-7b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen2.5-7B-Instruct"

[models.qwen-14b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen2.5-14B-Instruct"

[models.qwen-32b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen2.5-32B-Instruct"

[models.qwen-72b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen2.5-72B-Instruct"

[models.mistral-7b-sbatch]
mode = "sbatch"
model = "mistralai/Mistral-7B-Instruct-v0.3"

# Ministral uses Mistral's native format, not HuggingFace format.
[models.ministral-8b-sbatch]
mode = "sbatch"
model = "mistralai/Ministral-8B-Instruct-2410"
vllm_kwargs = { tokenizer_mode = "mistral", config_format = "mistral", load_format = "mistral" }

# Gated model — requires accepting Meta's license on HuggingFace
# and HF_TOKEN available on Isambard (already in .env).
[models.llama-8b-sbatch]
mode = "sbatch"
model = "meta-llama/Meta-Llama-3.1-8B-Instruct"

# Gated model — requires HF_TOKEN on Isambard (already in .env).
[models.llama-70b-sbatch]
mode = "sbatch"
model = "meta-llama/Meta-Llama-3.1-70B-Instruct"

[models.phi-4-sbatch]
mode = "sbatch"
model = "microsoft/phi-4"
vllm_kwargs = { trust_remote_code = true }

# Gemma's native dtype is bfloat16; FP8 less tested for this arch.
[models.gemma-27b-sbatch]
mode = "sbatch"
model = "google/gemma-3-27b-it"
dtype = "bfloat16"
vllm_kwargs = { trust_remote_code = true }

[models.exaone-32b-sbatch]
mode = "sbatch"
model = "LGAI-EXAONE/EXAONE-4.0-32B"

# Reasoning model (distilled from DeepSeek-R1). Emits <think>...</think> before answer.
[models.deepseek-r1-qwen-32b-sbatch]
mode = "sbatch"
model = "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"

# ──── 1-GPU large models ────

# MoE (117B total, 5.1B active, 128 experts, top-4 routing).
# Ships in native MXFP4 (~61 GB); vLLM auto-detects quantization.
[models.gpt-oss-120b-sbatch]
mode = "sbatch"
model = "openai/gpt-oss-120b"
dtype = "bfloat16"

# MoE (109B total, 17B active, 16 experts).
# Gated model — requires HF_TOKEN on Isambard (already in .env).
[models.llama-4-scout-sbatch]
mode = "sbatch"
model = "meta-llama/Llama-4-Scout-17B-16E-Instruct"

# ──── 2-GPU models ────

# MoE + DeltaNet hybrid (122B total, 10B active, 256 experts, 32 attn heads).
# Uses pre-quantized FP8 checkpoint to avoid OOM from dynamic bf16→fp8 conversion
# during weight loading (256 experts' temporary bf16 buffers exceed 95 GB on 2 GPUs).
# FP8 KV cache produces corrupt output; kv_cache_dtype="auto" forces bf16 KV.
[models."qwen3.5-122b-sbatch"]
mode = "sbatch"
model = "Qwen/Qwen3.5-122B-A10B-FP8"
dtype = "bfloat16"
gpus = 2
vllm_kwargs = { trust_remote_code = true, kv_cache_dtype = "auto" }

# Hybrid Mamba-2 + MoE + Attention (120B total, 12B active).
[models.nemotron-super-120b-sbatch]
mode = "sbatch"
model = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B"
gpus = 2

# Dense 123B. All 123B parameters active per token.
[models.mistral-large-2-sbatch]
mode = "sbatch"
model = "mistralai/Mistral-Large-Instruct-2411"
gpus = 2

# ──── 3-GPU models ────

# MoE (230B total, 10B active, Lightning Attention).
# Ships as native FP8 (~230 GB); vLLM auto-detects quantization.
[models."minimax-m2.5-sbatch"]
mode = "sbatch"
model = "MiniMaxAI/MiniMax-M2.5"
dtype = "bfloat16"
gpus = 3
vllm_kwargs = { trust_remote_code = true }

# ──── 4-GPU models ────

# MoE (235B total, 22B active, 128 experts).
# 64 attention heads requires TP divisible by 64 → gpus=4 (not 3).
[models.qwen3-235b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-235B-A22B"
gpus = 4

# MoE (355B total, 32B active). DeepSeekMoE variant. MIT license.
[models."glm-4.7-sbatch"]
mode = "sbatch"
model = "zai-org/GLM-4.7"
gpus = 4
vllm_kwargs = { trust_remote_code = true }
