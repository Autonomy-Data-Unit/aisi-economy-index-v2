# Reranking model configurations
#
# Three backends supported:
# - cross-encoder: Classic cross-encoder via sentence-transformers CrossEncoder
# - vllm: Generative reranker via vLLM (e.g. Qwen3-Reranker)
# - (api mode): Uses litellm.rerank for hosted reranking APIs (Voyage, Cohere)
#
# For vllm backend, set backend = "vllm" and optionally instruction/tensor_parallel_size.

# Defaults

[defaults.api]

[defaults.local]
device = "cuda"
dtype = "float16"
batch_size = 64
backend = "cross-encoder"

[defaults.sbatch]
device = "cuda"
dtype = "float16"
batch_size = 64
gpus = 1
job_name = "rerank"
setup = true
backend = "cross-encoder"

# ----------------------------------------
# API models (hosted reranking services)
# ----------------------------------------

[models."voyage-rerank-2.5"]
mode = "api"
model = "voyage/rerank-2.5"

# ----------------------------------------
# Local models (CPU-compatible for testing)
# ----------------------------------------

# TinyBERT cross-encoder (4.5M params). Poor quality but runs on CPU.
# For local testing only.
[models.tinybert-reranker-mac]
mode = "local"
model = "cross-encoder/ms-marco-TinyBERT-L-2-v2"
device = "cpu"
dtype = "float32"
batch_size = 32

[models.bge-reranker-v2-m3-local]
mode = "local"
model = "BAAI/bge-reranker-v2-m3"

# ----------------------------------------
# Sbatch models (cross-encoder)
# ----------------------------------------

[models.bge-reranker-v2-m3-sbatch]
mode = "sbatch"
model = "BAAI/bge-reranker-v2-m3"

[models.ms-marco-minilm-sbatch]
mode = "sbatch"
model = "cross-encoder/ms-marco-MiniLM-L-12-v2"

[models.gte-reranker-modernbert-sbatch]
mode = "sbatch"
model = "Alibaba-NLP/gte-reranker-modernbert-base"

# Gemma2 9B base — DISABLED: model's custom code imports Gemma2FlashAttention2
# which was removed in transformers 5.x. Use bge-reranker-v2-gemma-sbatch instead.
# [models.bge-reranker-v2-gemma2-sbatch]
# mode = "sbatch"
# model = "BAAI/bge-reranker-v2.5-gemma2-lightweight"
# backend = "vllm"
# vllm_prompt_style = "bge-gemma"
# max_model_len = 1024
# batch_size = 32

[models.nemotron-rerank-1b-sbatch]
mode = "sbatch"
model = "nvidia/llama-nemotron-rerank-1b-v2"
trust_remote_code = true

# Qwen3 rerankers converted to CrossEncoder format (no vLLM needed)
[models."qwen3-reranker-0.6b-ce-sbatch"]
mode = "sbatch"
model = "tomaarsen/Qwen3-Reranker-0.6B-seq-cls"

[models.qwen3-reranker-4b-ce-sbatch]
mode = "sbatch"
model = "tomaarsen/Qwen3-Reranker-4B-seq-cls"

[models.qwen3-reranker-8b-ce-sbatch]
mode = "sbatch"
model = "tomaarsen/Qwen3-Reranker-8B-seq-cls"

# ----------------------------------------
# Sbatch models (generative, vLLM backend)
# ----------------------------------------

# BGE Gemma reranker (Gemma-2B base, yes/no logit scoring)
[models.bge-reranker-v2-gemma-sbatch]
mode = "sbatch"
model = "BAAI/bge-reranker-v2-gemma"
backend = "vllm"
vllm_prompt_style = "bge-gemma"
max_model_len = 1024
batch_size = 128
instruction = "Given a query A and a passage B, determine whether the passage contains an answer to the query by providing a prediction of either 'Yes' or 'No'."

[models."qwen3-reranker-0.6b-sbatch"]
mode = "sbatch"
model = "Qwen/Qwen3-Reranker-0.6B"
backend = "vllm"
batch_size = 128
instruction = "Given a job advertisement, determine if the occupation description accurately describes the type of work in the advertisement"

[models.qwen3-reranker-4b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Reranker-4B"
backend = "vllm"
batch_size = 64
instruction = "Given a job advertisement, determine if the occupation description accurately describes the type of work in the advertisement"

[models.qwen3-reranker-8b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Reranker-8B"
backend = "vllm"
batch_size = 32
instruction = "Given a job advertisement, determine if the occupation description accurately describes the type of work in the advertisement"
