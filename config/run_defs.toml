[defaults]
sample_n = 10
sample_seed = 42
embedding_model = "text-embedding-3-large"
cosine_mode = "api"
topk = 5
llm_model = "gpt-5.2"
llm_batch_size = 1000
llm_max_new_tokens = 220
llm_max_concurrent_batches = 1
[defaults.fetch_adzuna]
fetch_years = "all"

[defaults.llm_summarise]
summarise_resume = true
summarise_max_retries = 0

[runs.baseline]
# inherits all defaults

[runs.test]
sample_n = 10

[runs.test_api]
sample_n = 10
embedding_model = "text-embedding-3-large"
cosine_mode = "api"
llm_model = "gpt-5.2"

[runs.test_local]
sample_n = 10
embedding_model = "bge-large-mac"
cosine_mode = "api"
llm_model = "qwen-0.5b-mac"

[runs.test_sbatch]
sample_n = 10
embedding_model = "bge-large-sbatch"
cosine_mode = "sbatch"
llm_model = "qwen-7b-sbatch"
