[defaults]
sample_n = 10
sample_seed = 42
embedding_model = "bge-large-sbatch"
llm_model = "qwen-7b-sbatch"
llm_batch_size = 50000
llm_max_new_tokens = 2048
sbatch_cache = true
duckdb_memory_limit = "4GB"
temperature = 0.0
top_p = 1.0
top_k = -1

[defaults.fetch_adzuna]
fetch_years = "all"
skip_fetch = true

[defaults.prepare_onet_targets]
onet_exclude_public_sector = true
onet_top_n = 10

[defaults.embed_onet]
sbatch_time = "01:00:00"

[defaults.embed_ads]
sbatch_time = "04:00:00"
embed_task_prompt = ""
chunk_size = 50000
max_concurrent_chunks = 10

[defaults.cosine_candidates]
cosine_topk = 20
chunk_size = 50000

[defaults.rerank_candidates]
rerank_model = "qwen3-reranker-8b-sbatch"
sbatch_time = "04:00:00"
chunk_size = 50000
max_concurrent_chunks = 10

[defaults.llm_filter_candidates]
sbatch_time = "12:00:00"
max_concurrent_chunks = 10
filter_resume = true
filter_max_retries = 3
filter_raise_on_failure = false
system_prompt = "llm_filter/v2/system"
user_prompt = "llm_filter/v2/user"

[defaults.compute_job_ad_exposure]
exposure_chunk_size = 50000

[defaults.score_felten]
felten_alpha = 0.5
felten_scenario = "baseline_2025"

[defaults.score_task_exposure]
sbatch_time = "02:00:00"
llm_model = "gpt-5.2"
llm_max_new_tokens = 4096
system_prompt = "score_task_exposure/main/system"
user_prompt = "score_task_exposure/main/user"

[defaults.score_task_exposure_bt]
sbatch_time = "02:00:00"
llm_model = "gpt-4.1-mini"
llm_max_new_tokens = 256
llm_batch_size = 10000
n_rounds = 3
comparisons_per_item_r1 = 5
comparisons_per_item_r2 = 4
comparisons_per_item_r3 = 3
system_prompt = "score_task_exposure/pairwise/system"
user_prompt = "score_task_exposure/pairwise/user"

# ---------------
#   Calibration
# ---------------

[runs.calibration]
# llm_model and embedding_model are injected dynamically by the calibration script.
sample_n = 1000
sbatch_cache = false

[runs.calibration.llm_filter_candidates]
sbatch_time = "04:00:00"
filter_resume = false

[runs.calibration.embed_onet]
sbatch_time = "00:30:00"

[runs.calibration.embed_ads]
sbatch_time = "00:30:00"

[runs.calibration.rerank_candidates]
sbatch_time = "00:30:00"

[runs.calibration.score_task_exposure]
sbatch_time = "00:30:00"


# --------
#   Runs
# --------

[runs.test_api]
sample_n = 10
embedding_model = "text-embedding-3-large"
llm_model = "gpt-5.2"

[runs.test_api.rerank_candidates]
rerank_model = "voyage-rerank-2.5"

[runs.test_local]
sample_n = 10
embedding_model = "bge-large-mac"
llm_model = "qwen-0.5b-mac"

[runs.test_local.rerank_candidates]
rerank_model = "tinybert-reranker-mac"

[runs.test_sbatch]
sample_n = 10
llm_model = "qwen-7b-sbatch"

[runs.test_trust_remote_code]
sample_n = 10
llm_model = "phi-4-sbatch"
embedding_model = "gte-large-sbatch"


# ----------------
#   Validation
# ----------------

[runs.validation_5k]
sample_n = 5000
sample_seed = 42
sbatch_cache = true

[runs.validation_5k.llm_filter_candidates]
sbatch_time = "04:00:00"
filter_resume = true

[runs.validation_5k.embed_onet]
sbatch_time = "01:00:00"

[runs.validation_5k.embed_ads]
sbatch_time = "02:00:00"

[runs.validation_5k.rerank_candidates]
sbatch_time = "08:00:00"

[runs.validation_5k.score_task_exposure]
sbatch_time = "02:00:00"


# ---------------
#   Benchmark
# ---------------
# High-quality API-only benchmark run for evaluating pipeline output quality.
# Uses frontier models throughout: GPT-5.4 for LLM filter, text-embedding-3-large
# for embeddings, voyage-rerank-2.5 for reranking. Same sample as validation_5k.

[runs.benchmark_5k]
sample_n = 5000
sample_seed = 42
embedding_model = "text-embedding-3-large"
llm_model = "gpt-5.4"

[runs.benchmark_5k.rerank_candidates]
rerank_model = "zerank-2"
chunk_size = 500

[runs.benchmark_5k.llm_filter_candidates]
filter_resume = true

# ---------------
#   Production
# ---------------
# 5M ad run using models selected from validation:
#   Embedding: Qwen3-Embedding-8B (best benchmark Pearson: 0.961)
#   LLM filter: Gemma-3-27B (2nd best Pearson: 0.942, 1-GPU, 0.261 s/ad)
#   Reranker: Qwen3-Reranker-8B (best Pearson: 0.949, dominant on all metrics)
# Estimated ~500 GPU-hrs total.

[runs.production_5m]
sample_n = 5000000
embedding_model = "qwen3-embed-8b-sbatch"
llm_model = "gemma-27b-sbatch"
duckdb_memory_limit = "8GB"

[runs.production_5m.fetch_adzuna]
skip_fetch = false

[runs.production_5m.embed_ads]
max_concurrent_chunks = 100
chunk_size = 50000

[runs.production_5m.llm_filter_candidates]
filter_resume = true
max_concurrent_chunks = 100
filter_max_retries = 0

[runs.production_5m.rerank_candidates]
rerank_model = "qwen3-reranker-8b-sbatch"
max_concurrent_chunks = 100


[runs.benchmark_5k_opus]
sample_n = 5000
sample_seed = 42
embedding_model = "text-embedding-3-large"
llm_model = "claude-opus-4.6"

[runs.benchmark_5k_opus.rerank_candidates]
rerank_model = "voyage-rerank-2.5"
chunk_size = 500

[runs.benchmark_5k_opus.llm_filter_candidates]
filter_resume = true
