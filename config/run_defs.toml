[defaults]
sample_n = 10
sample_seed = 42
embedding_model = "bge-large-sbatch"
cosine_mode = "sbatch"
topk = 10
llm_model = "qwen-7b-sbatch"
llm_batch_size = 5000
llm_max_new_tokens = 2048
llm_max_concurrent_batches = 1
sbatch_cache = true

[defaults.fetch_adzuna]
fetch_years = "all"

[defaults.prepare_onet_targets]
onet_exclude_public_sector = true
onet_top_n = 10

[defaults.embed_onet]
sbatch_time = "01:00:00"

[defaults.embed_ads]
embed_chunk_size = 50000
sbatch_time = "04:00:00"

[defaults.cosine_match]
cosine_alpha = 0.4
cosine_chunk_size = 50000
sbatch_time = "02:00:00"

[defaults.llm_summarise]
sbatch_time = "08:00:00"
summarise_resume = true
summarise_max_retries = 0
summarise_raise_on_failure = false
system_prompt = "llm_summarise/main/system"
user_prompt = "llm_summarise/main/user"

[defaults.llm_filter_candidates]
sbatch_time = "08:00:00"
filter_resume = true
filter_max_retries = 0
filter_raise_on_failure = false
system_prompt = "llm_filter/main/system"
user_prompt = "llm_filter/main/user"

[defaults.compute_job_ad_aspectt_vectors]
aspectt_chunk_size = 50000

[defaults.compute_job_ad_exposure]
exposure_chunk_size = 50000

[defaults.score_felten]
felten_alpha = 0.5
felten_scenario = "baseline_2025"

[defaults.score_task_exposure]
sbatch_time = "02:00:00"
llm_model = "gpt-5.2"
system_prompt = "score_task_exposure/main/system"
user_prompt = "score_task_exposure/main/user"

# ---------------
#   Calibration
# ---------------

[runs.calibration]
# llm_model and embedding_model are injected dynamically by the calibration script.
sample_n = 1000

[runs.calibration.llm_summarise]
sbatch_time = "01:00:00"
summarise_resume = false

[runs.calibration.llm_filter_candidates]
sbatch_time = "01:00:00"
filter_resume = false

[runs.calibration.embed_onet]
sbatch_time = "00:30:00"

[runs.calibration.embed_ads]
sbatch_time = "00:30:00"

[runs.calibration.cosine_match]
sbatch_time = "00:30:00"

[runs.calibration.score_task_exposure]
sbatch_time = "00:30:00"


# --------
#   Runs
# --------

[runs.test_api]
sample_n = 10
embedding_model = "text-embedding-3-large"
cosine_mode = "api"
llm_model = "gpt-5.2"

[runs.test_local]
sample_n = 10
embedding_model = "bge-large-mac"
cosine_mode = "api"
llm_model = "qwen-0.5b-mac"

[runs.test_sbatch]
sample_n = 10
llm_model = "qwen-7b-sbatch"
