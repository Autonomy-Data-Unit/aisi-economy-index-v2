[server]
name = "aisi-exposure-index"
type = "cpx62"
location = "fsn1"
image = "ubuntu-24.04"
ssh_key_name = "main"
ssh_pubkey_path = "~/.ssh/id_ed25519.pub"

[volume]
name = "aisi-exposure-index-store"
size = 500  # GB
format = "ext4"
mount_point = "/mnt/store"

[repo]
path = "/root/aisi-exposure-index"
