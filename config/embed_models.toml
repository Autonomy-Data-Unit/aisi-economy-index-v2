# Defaults

[defaults.api]
batch_size = 200

[defaults.local]
device = "cuda"
dtype = "float16"
batch_size = 64

[defaults.sbatch]
dtype = "float16"
batch_size = 64
gpus = 1
job_name = "embed"
setup = true

# Models

[models."text-embedding-3-small"]
mode = "api"
model = "text-embedding-3-small"

[models."text-embedding-3-large"]
mode = "api"
model = "text-embedding-3-large"

[models.bge-large-local]
mode = "local"
model = "BAAI/bge-large-en-v1.5"

[models.bge-large-mac]
mode = "local"
model = "BAAI/bge-large-en-v1.5"
device = "cpu"
dtype = "float32"

[models.gemini-embed]
mode = "api"
model = "gemini/gemini-embedding-001"
batch_size = 10
retry_delay = 65
max_retries = 20

[models.bge-large-sbatch]
mode = "sbatch"
model = "BAAI/bge-large-en-v1.5"

[models.e5-large-sbatch]
mode = "sbatch"
model = "intfloat/e5-large-v2"

# Custom arch (BERT + RoPE + GLU) requires trust_remote_code.
[models.gte-large-sbatch]
mode = "sbatch"
model = "Alibaba-NLP/gte-large-en-v1.5"
st_kwargs = { trust_remote_code = true }

# Fully open (code+data+weights). Custom arch requires trust_remote_code.
[models.nomic-embed-sbatch]
mode = "sbatch"
model = "nomic-ai/nomic-embed-text-v1.5"
st_kwargs = { trust_remote_code = true }

# Gemma 3 architecture. Does NOT support float16 — must use bfloat16.
[models.embedding-gemma-sbatch]
mode = "sbatch"
model = "google/EmbeddingGemma-300M"
dtype = "bfloat16"

# 1024-dim like BGE baseline. Custom arch requires trust_remote_code.
[models.arctic-embed-l-sbatch]
mode = "sbatch"
model = "Snowflake/snowflake-arctic-embed-l-v2.0"
st_kwargs = { trust_remote_code = true }

[models."qwen3-embed-0.6b-sbatch"]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-0.6B"

[models.qwen3-embed-4b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-4B"

[models.qwen3-embed-8b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-8B"

# Llama-3.1-8B base with bidirectional attention. Requires trust_remote_code.
# Native dtype is bfloat16; float16 may produce NaN due to dynamic range issues.
[models.llama-embed-nemotron-sbatch]
mode = "sbatch"
model = "nvidia/llama-embed-nemotron-8b"
dtype = "bfloat16"
st_kwargs = { trust_remote_code = true }
