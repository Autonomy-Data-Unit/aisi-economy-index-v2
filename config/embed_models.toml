# Embedding model configurations
#
# Prompt support fields:
#   prompt_name  - Use a named prompt from the model's SentenceTransformer config
#                  (e.g. "query"). Only for models with built-in prompt configs.
#   prompt       - Raw string prepended to each text before encoding. For models
#                  that need a manual prefix (e.g. "query: ").
#
# These fields document what the model supports. The pipeline nodes use them
# to decide how to call embed() for queries vs documents.
#
# Conventions:
#   query_prompt_name / query_prompt   - prompt for query-side texts (job ads)
#   document_prompt_name / document_prompt - prompt for document-side texts (O*NET)
#   If absent, no prompt is applied for that side.

# Defaults

[defaults.api]
batch_size = 200

[defaults.local]
device = "cuda"
dtype = "float16"
batch_size = 64

[defaults.sbatch]
dtype = "float16"
batch_size = 64
gpus = 1
job_name = "embed"
setup = true

# ----------------------------------------
# API models
# ----------------------------------------

# No instruction support.
[models."text-embedding-3-small"]
mode = "api"
model = "text-embedding-3-small"

# No instruction support.
[models."text-embedding-3-large"]
mode = "api"
model = "text-embedding-3-large"

# Supports task_type API parameter (not text prefix). Not yet integrated.
[models.gemini-embed]
mode = "api"
model = "gemini/gemini-embedding-001"
batch_size = 10
retry_delay = 65
max_retries = 20

# ----------------------------------------
# Local models
# ----------------------------------------

# Optional prompt: "Represent this sentence for searching relevant passages: "
[models.bge-large-local]
mode = "local"
model = "BAAI/bge-large-en-v1.5"
query_prompt = "Represent this sentence for searching relevant passages: "

[models.bge-large-mac]
mode = "local"
model = "BAAI/bge-large-en-v1.5"
device = "cpu"
dtype = "float32"
query_prompt = "Represent this sentence for searching relevant passages: "

# ----------------------------------------
# Sbatch models
# ----------------------------------------

# Optional prompt: "Represent this sentence for searching relevant passages: "
[models.bge-large-sbatch]
mode = "sbatch"
model = "BAAI/bge-large-en-v1.5"
query_prompt = "Represent this sentence for searching relevant passages: "

# Required prefixes: "query: " for queries, "passage: " for documents.
[models.e5-large-sbatch]
mode = "sbatch"
model = "intfloat/e5-large-v2"
query_prompt = "query: "
document_prompt = "passage: "

# No instruction support.
# Custom arch (BERT + RoPE + GLU) requires trust_remote_code.
[models.gte-large-sbatch]
mode = "sbatch"
model = "Alibaba-NLP/gte-large-en-v1.5"
st_kwargs = { trust_remote_code = true }

# Required prefixes: "search_query: " for queries, "search_document: " for documents.
# Custom arch requires trust_remote_code.
[models.nomic-embed-sbatch]
mode = "sbatch"
model = "nomic-ai/nomic-embed-text-v1.5"
st_kwargs = { trust_remote_code = true }
query_prompt = "search_query: "
document_prompt = "search_document: "

# Has built-in prompt_name support: "query", "document", "STS", etc.
# Gemma 3 architecture. Does NOT support float16 -- must use bfloat16.
[models.embedding-gemma-sbatch]
mode = "sbatch"
model = "google/EmbeddingGemma-300M"
dtype = "bfloat16"
query_prompt_name = "query"
document_prompt_name = "document"

# Has built-in prompt_name support: "query" (adds "query: " prefix).
# 1024-dim like BGE baseline. Custom arch requires trust_remote_code.
[models.arctic-embed-l-sbatch]
mode = "sbatch"
model = "Snowflake/snowflake-arctic-embed-l-v2.0"
st_kwargs = { trust_remote_code = true }
query_prompt_name = "query"

# Has built-in prompt_name support: "query", "document".
# Default query instruction: "Given a web search query, retrieve relevant passages..."
# Can override with custom prompt for domain-specific tasks.
[models."qwen3-embed-0.6b-sbatch"]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-0.6B"
query_prompt_name = "query"

[models.qwen3-embed-4b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-4B"
query_prompt_name = "query"

[models.qwen3-embed-8b-sbatch]
mode = "sbatch"
model = "Qwen/Qwen3-Embedding-8B"
query_prompt_name = "query"

# Has built-in prompt_name support: "query", "document".
# Llama-3.1-8B base with bidirectional attention. Requires trust_remote_code.
# Native dtype is bfloat16; float16 may produce NaN due to dynamic range issues.
[models.llama-embed-nemotron-sbatch]
mode = "sbatch"
model = "nvidia/llama-embed-nemotron-8b"
dtype = "bfloat16"
st_kwargs = { trust_remote_code = true }
query_prompt_name = "query"
