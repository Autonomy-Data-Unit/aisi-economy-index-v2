# Defaults

[defaults.api]
batch_size = 200

[defaults.local]
device = "cuda"
dtype = "float16"
batch_size = 64

[defaults.sbatch]
dtype = "float16"
batch_size = 64
gpus = 1
job_name = "embed"
time = "01:00:00"
setup = true

# Models

[models."text-embedding-3-small"]
mode = "api"
model = "text-embedding-3-small"

[models."text-embedding-3-large"]
mode = "api"
model = "text-embedding-3-large"

[models.bge-large-local]
mode = "local"
model = "BAAI/bge-large-en-v1.5"

[models.bge-large-mac]
mode = "local"
model = "BAAI/bge-large-en-v1.5"
device = "cpu"
dtype = "float32"

[models.gemini-embed]
mode = "api"
model = "gemini/gemini-embedding-001"
batch_size = 10
retry_delay = 65
max_retries = 20

[models.bge-large-sbatch]
mode = "sbatch"
model = "BAAI/bge-large-en-v1.5"

[models.e5-large-sbatch]
mode = "sbatch"
model = "intfloat/e5-large-v2"

# NOTE: Requires trust_remote_code=True in SentenceTransformer (not yet
# supported by our load_embedding_model code). Custom arch: BERT + RoPE + GLU.
[models.gte-large-sbatch]
mode = "sbatch"
model = "Alibaba-NLP/gte-large-en-v1.5"
